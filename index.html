    import { createRoot as __createRoot } from 'react-dom/client';

    // Captura erros globais e mostra na tela em vez de travar no loading
    window.addEventListener('error', (e) => {
      const l = document.getElementById('loading');
      if (l) {
        l.innerHTML = '<div style="padding:20px; font-family:monospace; font-size:13px; color:#ff8a65; max-width:90vw; word-break:break-word; line-height:1.5;">' +
          '<div style="color:#D4A574; font-size:16px; margin-bottom:12px; font-family:serif; font-style:italic;">Erro de carregamento</div>' +
          '<div>' + (e.message || 'erro desconhecido') + '</div>' +
          (e.filename ? '<div style="margin-top:8px; color:#7a7a68;">em ' + e.filename + ':' + e.lineno + ':' + e.colno + '</div>' : '') +
          '</div>';
      }
    });
    window.addEventListener('unhandledrejection', (e) => {
      const l = document.getElementById('loading');
      if (l) {
        l.innerHTML = '<div style="padding:20px; font-family:monospace; font-size:13px; color:#ff8a65; max-width:90vw; word-break:break-word; line-height:1.5;">' +
          '<div style="color:#D4A574; font-size:16px; margin-bottom:12px; font-family:serif; font-style:italic;">Promise rejeitada</div>' +

          '</div>';
      }
    });

/* === COLE AQUI O CONTEÚDO DO COMPONENTE === */

    // Sorteia regime + forecast com nível de confiança realista
    function sortearENSO() {
      const r = Math.random();
      let actual;
      if (r < 0.12) actual = 'ninho_forte';
      else if (r < 0.32) actual = 'ninho_fraco';
      else if (r < 0.62) actual = 'neutro';
      else if (r < 0.82) actual = 'ninha_fraca';
      else actual = 'ninha_forte';

      const confidence = 0.60 + Math.random() * 0.32; // 60-92%
      let forecast;
      if (Math.random() < confidence) {
        forecast = actual;
      } else {
        const ordered = ['ninho_forte', 'ninho_fraco', 'neutro', 'ninha_fraca', 'ninha_forte'];
        const idx = ordered.indexOf(actual);
        const dir = Math.random() < 0.5 ? -1 : 1;
        forecast = ordered[Math.max(0, Math.min(ordered.length - 1, idx + dir))];
      }
      return { actual, forecast, confidence: Math.round(confidence * 100) };
    }

    // ============================================================
    // DERIVA NATURAL DO MERCADO ENTRE FASES (random walk + sazonalidade)
    // ============================================================
    // Magnitudes calibradas pela volatilidade histórica:
    // - PTAX: ~2-3% ao mês → ±3-5% em transições de 1-3 meses
    // - Soja B3: ~3-5% ao mês → ±4-6% por transição
    // - Basis MT: piora -R$2 a -R$3 aproximando colheita; melhora +R$2 a +R$4 na entressafra
    const DRIFT_BY_FASE = {
      'setup-plantio':           { meses: 1,   ptax: 0.025, cbot: 0.025, basisSazonal: 0.5,  basisRand: 1.0 },
      'plantio-eventos':         { meses: 2,   ptax: 0.035, cbot: 0.045, basisSazonal: -0.8, basisRand: 1.2 },
      'setup-manejo':            { meses: 1,   ptax: 0.022, cbot: 0.030, basisSazonal: -0.8, basisRand: 1.0 },
      'vegetativo-eventos':      { meses: 1,   ptax: 0.025, cbot: 0.035, basisSazonal: -1.5, basisRand: 1.5 },
      'enchimento-eventos':      { meses: 1,   ptax: 0.025, cbot: 0.035, basisSazonal: -2.0, basisRand: 1.5 },
      'colheita-eventos':        { meses: 2,   ptax: 0.035, cbot: 0.040, basisSazonal: -2.5, basisRand: 2.0 },
      'setup-venda':             { meses: 0.5, ptax: 0.015, cbot: 0.018, basisSazonal: 1.0,  basisRand: 1.0 },
      'comercializacao-eventos': { meses: 3,   ptax: 0.045, cbot: 0.055, basisSazonal: 3.5,  basisRand: 2.5 }
    };

    function aplicarDeriva(simState, faseAlvo) {
      const cfg = DRIFT_BY_FASE[faseAlvo];
      if (!cfg) return simState;
      // Movimento uniforme em [-max, +max] — random walk simples
      const ptaxMove = (Math.random() - 0.5) * 2 * cfg.ptax;
      const cbotMove = (Math.random() - 0.5) * 2 * cfg.cbot;
      const basisMove = cfg.basisSazonal + (Math.random() - 0.5) * 2 * cfg.basisRand;
      return {
        ...simState,
        modPtax: simState.modPtax * (1 + ptaxMove),
        modCbot: simState.modCbot * (1 + cbotMove),
        modBasis: simState.modBasis + basisMove
      };
    }

    // Atualiza forecast e confiança ao longo da safra.
    // Em vida real, forecasts ENSO são atualizados mensalmente (CFS/NOAA, INMET, ECMWF).
    // Confidence sobe naturalmente conforme novos dados chegam.
    // Se o forecast inicial estava errado, ele tende a se aproximar do regime real.
    function atualizarForecast(enso, faseDestino, rng = Math.random) {
      const boostPorFase = {
        'setup-plantio':           5,
        'plantio-eventos':         7,
        'setup-manejo':            9,
        'vegetativo-eventos':     12,
        'enchimento-eventos':      7,
        'colheita-eventos':        3,
        'setup-venda':             2,
        'comercializacao-eventos': 0
      };
      const boost = boostPorFase[faseDestino] || 0;
      if (boost === 0 && enso.forecast === enso.actual) {
        return { ...enso, revisedThisPhase: false };
      }
      const novaConfianca = Math.min(97, (enso.confidence || 70) + boost);

      // Revisão só rola em fases de eventos (pra aparecer junto dos outros eventos)
      // e só se o forecast estiver diferente do regime real
      const ehFaseDeEventos = faseDestino.endsWith('-eventos');
      let novoForecast = enso.forecast;
      let revisedThisPhase = false;
      let prevForecast = enso.prevForecast || null;

      if (ehFaseDeEventos && enso.forecast !== enso.actual && boost > 0) {
        // Probabilidade de revisão cresce com o boost
        const chance = (boost / 100) * 2.8;
        if (rng() < chance) {
          const ordem = ['ninho_forte', 'ninho_fraco', 'neutro', 'ninha_fraca', 'ninha_forte'];
          const fIdx = ordem.indexOf(enso.forecast);
          const aIdx = ordem.indexOf(enso.actual);
          const direcao = aIdx > fIdx ? 1 : -1;
          novoForecast = ordem[fIdx + direcao];
          revisedThisPhase = true;
          prevForecast = enso.forecast;
        }
      }

      return {
        actual: enso.actual,
        forecast: novoForecast,
        confidence: novaConfianca,
        revisedThisPhase,
        prevForecast
      };
    }

    function rolarEventosDaFase(fase, decisoes, ensoActual, commodity = 'soja', rng = Math.random) {
      const regime = ENSO_REGIMES[ensoActual] || ENSO_REGIMES.neutro;
      const eventos = commodity === 'milho' ? EVENTOS_MILHO : EVENTOS;
      const mults = commodity === 'milho' ? (regime.multipliersSafrinha || {}) : (regime.multipliers || {});

      let result = eventos
        .filter(e => e.fase === fase)
        .filter(e => {
          const baseProb = e.prob(decisoes);
          const mult = mults[e.id] ?? 1.0;
          return rng() < baseProb * mult;
        });

      // Resolve conflitos mutuamente exclusivos
      const paresExclusivos = [
        ['usda_baixa', 'usda_alta'],
        ['dolar_sobe', 'dolar_cai'],
        ['chuva_excelente', 'seca_enchimento'],
        ['usda_milho_baixa', 'usda_milho_alta'],
        ['fim_chuvas_precoce', 'chuva_outono_excelente']
      ];
      for (const [a, b] of paresExclusivos) {
        const hasA = result.some(e => e.id === a);
        const hasB = result.some(e => e.id === b);
        if (hasA && hasB) {
          const keep = rng() < 0.5 ? a : b;
          result = result.filter(e => (e.id !== a && e.id !== b) || e.id === keep);
        }
      }

      return result;
    }

    // Helper: custos comprometidos até o momento atual (qualquer fase do jogo)
    function calcularCustosAcumulados(decisoes, simState) {
      const area = decisoes.area;
      const custos = { insumos: 0, manejo: 0, seguro: 0, extras: 0, financeiro: 0, total: 0 };

      if (decisoes.pacote) custos.insumos = PACOTES[decisoes.pacote].custoHa * area;
      if (decisoes.manejo) custos.manejo = MANEJOS[decisoes.manejo].custoHa * area;
      if (decisoes.seguro && decisoes.pacote) {
        custos.seguro = SEGUROS[decisoes.seguro].custoPct * PACOTES[decisoes.pacote].custoHa * area;
      }
      custos.extras = (simState.custoExtra || 0) * area;
      if (decisoes.financiamento && (custos.insumos + custos.manejo) > 0) {
        custos.financeiro = FINANCIAMENTOS[decisoes.financiamento].custoFin * (custos.insumos + custos.manejo);
      }
      custos.total = custos.insumos + custos.manejo + custos.seguro + custos.extras + custos.financeiro;

      // Caixa: seguro e extras sempre saem do bolso. Insumos+manejo só saem se for "à vista".
      let caixaPago = custos.seguro + custos.extras;
      if (decisoes.financiamento === 'avista') {
        caixaPago += custos.insumos + custos.manejo;
      }
      const caixa = decisoes.capital - caixaPago;
      const dividaAcumulada = custos.total - caixaPago;

      const prodReal = decisoes.pacote ? PACOTES[decisoes.pacote].prod * simState.modProd : 0;
      const sacasTotal = prodReal * area;
      const custoPorSaca = sacasTotal > 0 ? custos.total / sacasTotal : 0;

      return { ...custos, caixa, caixaPago, dividaAcumulada, prodReal, sacasTotal, custoPorSaca };
    }

    function calcularDRE(decisoes, simState) {
      const pacote = PACOTES[decisoes.pacote];
      const fin = FINANCIAMENTOS[decisoes.financiamento];
      const seg = SEGUROS[decisoes.seguro];
      const manejo = MANEJOS[decisoes.manejo];
      const area = decisoes.area;

      // Produtividade final
      const prodPotencial = pacote.prod;
      const prodReal = Math.max(15, prodPotencial * simState.modProd);
      const sacasTotal = prodReal * area;

      // Custos
      const custoInsumos = pacote.custoHa * area;
      const custoManejo = manejo.custoHa * area;
      const custoSeguro = seg.custoPct * pacote.custoHa * area;
      const custoExtra = simState.custoExtra * area;
      const custoFinanceiro = fin.custoFin * (custoInsumos + custoManejo);

      // Quebra de safra → seguro paga
      const prodFrustrada = prodReal < prodPotencial * 0.70;
      const indenizacao = prodFrustrada
        ? seg.cobertura * (custoInsumos + custoManejo) * (1 - prodReal / prodPotencial)
        : 0;

      // Preço final
      const basisFinal = INITIAL_MARKET.basisMT + simState.modBasis;
      const futuroFinal = INITIAL_MARKET.futuroJulho * simState.modCbot * simState.modPtax;
      const precoSpot = futuroFinal + basisFinal;

      // === HEDGE COM ENTREGA FÍSICA ===
      // Sacas comprometidas no contrato são FIXAS, baseadas na produção ESPERADA (potencial do pacote),
      // não na produção real. Se quebrar a safra, precisa COMPRAR no mercado pra cumprir o contrato.
      const sacasEsperadas = prodPotencial * area;
      const sacasComprometidas = sacasEsperadas * decisoes.travado;
      const precoTravado = INITIAL_MARKET.futuroJulho + INITIAL_MARKET.basisMT;
      const receitaTravada = sacasComprometidas * precoTravado;

      // Backup: se prod real < sacas comprometidas, precisa comprar a diferença no spot atual
      const sacasFaltantes = Math.max(0, sacasComprometidas - sacasTotal);
      const custoBackup = sacasFaltantes * precoSpot;

      // Sacas livres: o que sobrou da produção real depois de honrar o contrato
      const sacasLivres = Math.max(0, sacasTotal - sacasComprometidas);
      let precoMedioLivre;
      if (decisoes.venda === 'colheita') {
        precoMedioLivre = precoSpot;
      } else if (decisoes.venda === 'armazenar') {
        precoMedioLivre = precoSpot * 1.04 - 3.50;
      } else {
        precoMedioLivre = precoSpot * 1.02 - 1.80;
      }
      const receitaLivre = sacasLivres * precoMedioLivre;

      const receitaBruta = receitaTravada + receitaLivre + indenizacao;
      const custoTotal = custoInsumos + custoManejo + custoSeguro + custoExtra + custoFinanceiro + custoBackup;

      // Rendimento Selic acumulado fase a fase sobre caixa positivo (vem do simState)
      const rendimentoCaixa = simState.receitaFinanceira || 0;

      const lucro = receitaBruta - custoTotal + rendimentoCaixa;
      const lucroHa = lucro / area;
      const roe = lucro / decisoes.capital;

      // Sacas "travadas" pra exibir = min(produção real, sacas comprometidas)
      const sacasTravadas = Math.min(sacasTotal, sacasComprometidas);

      return {
        prodPotencial, prodReal, sacasTotal, sacasEsperadas,
        sacasTravadas, sacasComprometidas, sacasFaltantes, sacasLivres,
        precoTravado, precoMedioLivre,
        receitaTravada, receitaLivre, indenizacao, receitaBruta,
        custoBackup, custoInsumos, custoManejo, custoSeguro, custoExtra, custoFinanceiro, custoTotal,
        rendimentoCaixa,
        lucro, lucroHa, roe,
        futuroFinal, precoSpot, basisFinal, prodFrustrada
      };
    }

    // ============================================================
    // MILHO SAFRINHA — cálculos paralelos (sem seguro, sem manejo separado)
    // ============================================================
    function calcularCustosAcumuladosMilho(decisoes, simStateMilho, caixaInicial, area) {
      const custos = { insumos: 0, manejo: 0, extras: 0, financeiro: 0, total: 0 };

      if (decisoes.pacoteMilho) custos.insumos = PACOTES_MILHO[decisoes.pacoteMilho].custoHa * area;
      if (decisoes.manejoMilho) custos.manejo = MANEJOS_MILHO[decisoes.manejoMilho].custoHa * area;
      custos.extras = (simStateMilho.custoExtra || 0) * area;
      if (decisoes.financiamentoMilho && (custos.insumos + custos.manejo) > 0) {
        custos.financeiro = FINANCIAMENTOS_MILHO[decisoes.financiamentoMilho].custoFin * (custos.insumos + custos.manejo);
      }
      custos.total = custos.insumos + custos.manejo + custos.extras + custos.financeiro;

      // Caixa: extras saem sempre. Insumos+manejo só saem se for à vista.
      let caixaPago = custos.extras;
      if (decisoes.financiamentoMilho === 'avista') {
        caixaPago += custos.insumos + custos.manejo;
      }
      const caixa = caixaInicial - caixaPago;
      const dividaAcumulada = custos.total - caixaPago;

      const prodReal = decisoes.pacoteMilho ? PACOTES_MILHO[decisoes.pacoteMilho].prod * simStateMilho.modProd : 0;
      const sacasTotal = prodReal * area;
      const custoPorSaca = sacasTotal > 0 ? custos.total / sacasTotal : 0;

      return { ...custos, caixa, caixaPago, dividaAcumulada, prodReal, sacasTotal, custoPorSaca };
    }

    function calcularDREMilho(decisoes, simStateMilho, caixaInicial, area) {
      const pacote = PACOTES_MILHO[decisoes.pacoteMilho];
      const manejo = MANEJOS_MILHO[decisoes.manejoMilho];
      const fin = FINANCIAMENTOS_MILHO[decisoes.financiamentoMilho];

      // Produtividade — janela aplica modificador base + eventos
      const prodPotencial = pacote.prod;
      const modJanela = JANELAS_MILHO[decisoes.janelaMilho]?.modProd || 1.0;
      const prodReal = Math.max(10, prodPotencial * modJanela * simStateMilho.modProd);
      const sacasTotal = prodReal * area;

      // Custos
      const custoInsumos = pacote.custoHa * area;
      const custoManejo = manejo.custoHa * area;
      const custoExtra = simStateMilho.custoExtra * area;
      const custoFinanceiro = fin.custoFin * (custoInsumos + custoManejo);

      // Preços
      const basisFinal = INITIAL_MARKET_MILHO.basisMT + simStateMilho.modBasis;
      const futuroFinal = INITIAL_MARKET_MILHO.futuroSetembro * simStateMilho.modCbot;
      const precoSpot = futuroFinal + basisFinal;
      const precoTravado = INITIAL_MARKET_MILHO.futuroSetembro + INITIAL_MARKET_MILHO.basisMT;

      // Hedge com entrega física (mesma mecânica da soja)
      const sacasEsperadas = prodPotencial * modJanela * area; // baseado em condição normal pra janela escolhida
      const sacasComprometidas = sacasEsperadas * decisoes.travadoMilho;
      const receitaTravada = sacasComprometidas * precoTravado;
      const sacasFaltantes = Math.max(0, sacasComprometidas - sacasTotal);
      const custoBackup = sacasFaltantes * precoSpot;

      // Sacas livres + estratégia de venda
      const sacasLivres = Math.max(0, sacasTotal - sacasComprometidas);
      let precoMedioLivre;
      if (decisoes.vendaMilho === 'colheita') {
        precoMedioLivre = precoSpot;
      } else if (decisoes.vendaMilho === 'etanol') {
        precoMedioLivre = precoSpot * 1.05;  // usina paga prêmio modesto
      } else { // 'armazenar'
        precoMedioLivre = precoSpot * 1.06 - 2.50;  // entressafra
      }
      const receitaLivre = sacasLivres * precoMedioLivre;

      const receitaBruta = receitaTravada + receitaLivre;
      const custoTotal = custoInsumos + custoManejo + custoExtra + custoFinanceiro + custoBackup;

      // Rendimento Selic acumulado fase a fase sobre caixa positivo
      const rendimentoCaixa = simStateMilho.receitaFinanceira || 0;

      const lucro = receitaBruta - custoTotal + rendimentoCaixa;
      const lucroHa = lucro / area;
      const caixaFinal = caixaInicial + lucro;
      const sacasTravadas = Math.min(sacasTotal, sacasComprometidas);

      return {
        prodPotencial, prodReal, sacasTotal, sacasEsperadas,
        sacasTravadas, sacasComprometidas, sacasFaltantes, sacasLivres,
        precoTravado, precoMedioLivre,
        receitaTravada, receitaLivre, receitaBruta,
        custoBackup, custoInsumos, custoManejo, custoExtra, custoFinanceiro, custoTotal,
        rendimentoCaixa,
        lucro, lucroHa, caixaFinal,
        futuroFinal, precoSpot, basisFinal
      };
    }

    function MarketBar({ simState }) {
      const modCbot = simState.modCbot ?? 1;
      const modPtax = simState.modPtax ?? 1;
      const modBasis = simState.modBasis ?? 0;

      const futuroAtual = INITIAL_MARKET.futuroJulho * modCbot * modPtax;
      const basisAtual = INITIAL_MARKET.basisMT + modBasis;
      const spotAtual = futuroAtual + basisAtual;
      const ptaxAtual = INITIAL_MARKET.ptax * modPtax;

      const spotDeltaPct = ((spotAtual - INITIAL_MARKET.spotMT) / INITIAL_MARKET.spotMT) * 100;
      const basisDelta = basisAtual - INITIAL_MARKET.basisMT;
      const ptaxDeltaPct = ((ptaxAtual - INITIAL_MARKET.ptax) / INITIAL_MARKET.ptax) * 100;

      function arrow(num, treshold = 0.05) {
        if (Math.abs(num) < treshold) return { sym: '→', color: '#7a7a68' };
        if (num > 0) return { sym: '↑', color: '#8FB36B' };
        return { sym: '↓', color: '#C97B3F' };
      }

      const spotA = arrow(spotDeltaPct, 0.1);
      const basisA = arrow(basisDelta, 0.05);
      const ptaxA = arrow(ptaxDeltaPct, 0.1);

      return (
        <div className="grid grid-cols-3 gap-2 text-[11px]">
          <div className="bg-[#15170e] border border-[#2a2c1f] rounded p-2">
            <div className="text-[#7a7a68] uppercase tracking-wider text-[9px] mb-0.5 flex items-center">
              Spot MT
              <InfoTip title="Preço Spot — Mato Grosso">
                <p>Preço físico atual da saca em Sorriso/MT. É o que você embolsaria se vendesse hoje, sem hedge.</p>
                <p><strong>Como é formado:</strong> Spot = Futuro B3 × (variação CBOT × variação PTAX) + Basis.</p>
                <div className="bg-[#0f110a] rounded p-2 font-mono text-xs mt-2 space-y-1">
                  <div className="flex justify-between"><span className="text-[#8a8a78]">Inicial</span><span>{fmtBRL(INITIAL_MARKET.spotMT, 2)}</span></div>
                  <div className="flex justify-between"><span className="text-[#8a8a78]">Atual</span><span className="text-[#D4A574]">{fmtBRL(spotAtual, 2)}</span></div>
                  <div className="flex justify-between pt-1 border-t border-[#2a2c1f]"><span className="text-[#D4A574]">Variação</span><span style={{ color: spotA.color }}>{spotDeltaPct > 0 ? '+' : ''}{spotDeltaPct.toFixed(1)}%</span></div>
                </div>
                <p className="text-[#b5b1a0] text-xs mt-3">É o número mais importante pra você. Quando o spot sobe, sua receita sobe (na parte não-travada).</p>
              </InfoTip>
            </div>
            <div className="font-mono text-[#E8E4D5] text-sm">{spotAtual.toFixed(2)}</div>
            <div className="font-mono text-[9px] mt-0.5" style={{ color: spotA.color }}>
              {spotA.sym} {spotDeltaPct > 0 ? '+' : ''}{spotDeltaPct.toFixed(1)}%
            </div>
          </div>

          <div className="bg-[#15170e] border border-[#2a2c1f] rounded p-2">
            <div className="text-[#7a7a68] uppercase tracking-wider text-[9px] mb-0.5 flex items-center">
              Basis
              <InfoTip title="Basis — diferencial regional">
                <p>Diferença entre o futuro B3 e o spot na sua região. No MT é negativo: a soja em Sorriso vale menos que a referência B3 por causa do frete até o porto.</p>
                <div className="bg-[#0f110a] rounded p-2 font-mono text-xs mt-2 space-y-1">
                  <div className="flex justify-between"><span className="text-[#8a8a78]">Inicial</span><span>{INITIAL_MARKET.basisMT.toFixed(2)}</span></div>
                  <div className="flex justify-between"><span className="text-[#8a8a78]">Atual</span><span className="text-[#D4A574]">{basisAtual.toFixed(2)}</span></div>
                  <div className="flex justify-between pt-1 border-t border-[#2a2c1f]"><span className="text-[#D4A574]">Variação</span><span style={{ color: basisA.color }}>{basisDelta > 0 ? '+' : ''}{basisDelta.toFixed(2)}</span></div>
                </div>
                <p className="text-[#b5b1a0] text-xs mt-3">Eventos de frete e logística mexem aqui. Basis mais negativo = produtor MT recebe menos.</p>
              </InfoTip>
            </div>
            <div className="font-mono text-[#E8E4D5] text-sm">{basisAtual.toFixed(2)}</div>
            <div className="font-mono text-[9px] mt-0.5" style={{ color: basisA.color }}>
              {basisA.sym} {basisDelta > 0 ? '+' : ''}{basisDelta.toFixed(2)}
            </div>
          </div>

          <div className="bg-[#15170e] border border-[#2a2c1f] rounded p-2">
            <div className="text-[#7a7a68] uppercase tracking-wider text-[9px] mb-0.5 flex items-center">
              PTAX
              <InfoTip title="PTAX — câmbio USD/BRL">
                <p>Taxa de câmbio oficial do Banco Central. Como a soja é commodity dolarizada, quando o PTAX sobe, sua saca em reais sobe junto.</p>
                <div className="bg-[#0f110a] rounded p-2 font-mono text-xs mt-2 space-y-1">
                  <div className="flex justify-between"><span className="text-[#8a8a78]">Inicial</span><span>{INITIAL_MARKET.ptax.toFixed(2)}</span></div>
                  <div className="flex justify-between"><span className="text-[#8a8a78]">Atual</span><span className="text-[#D4A574]">{ptaxAtual.toFixed(2)}</span></div>
                  <div className="flex justify-between pt-1 border-t border-[#2a2c1f]"><span className="text-[#D4A574]">Variação</span><span style={{ color: ptaxA.color }}>{ptaxDeltaPct > 0 ? '+' : ''}{ptaxDeltaPct.toFixed(1)}%</span></div>
                </div>
                <p className="text-[#b5b1a0] text-xs mt-3">Eventos de dólar movem aqui. Se você travou cedo, dólar caindo é bom; dólar subindo é perda de upside.</p>
              </InfoTip>
            </div>
            <div className="font-mono text-[#E8E4D5] text-sm">{ptaxAtual.toFixed(2)}</div>
            <div className="font-mono text-[9px] mt-0.5" style={{ color: ptaxA.color }}>
              {ptaxA.sym} {ptaxDeltaPct > 0 ? '+' : ''}{ptaxDeltaPct.toFixed(1)}%
            </div>
          </div>
        </div>
      );
    }

    function ForecastChip({ enso }) {

      return (
        <div className="bg-[#15170e] border border-[#2a2c1f] rounded p-2.5 flex items-center gap-2.5">
          <div className="w-2 h-2 rounded-full flex-shrink-0" style={{ backgroundColor: f.cor }} />
          <div className="flex-1 min-w-0">
            <div className="flex items-baseline gap-2 flex-wrap">
              <span className="text-[10px] uppercase tracking-widest text-[#7a7a68] font-mono">Forecast safra</span>
              <span className="text-sm font-medium" style={{ color: f.cor }}>{f.label}</span>
              <span className="text-[10px] font-mono text-[#7a7a68]">· confiança {enso.confidence}%</span>
              <InfoTip title={`Forecast climático: ${f.label}`}>

                <p className="text-[#b5b1a0] text-xs mt-3">Confiança de {enso.confidence}% significa que há {100 - enso.confidence}% de chance do regime real ser diferente do previsto. Forecast nunca é certo.</p>

            <div className="text-[11px] text-[#8a8a78] leading-tight mt-0.5">{f.descricaoCurta}</div>
          </div>
        </div>
      );

    function StatBar({ decisoes, simState }) {
      const c = calcularCustosAcumulados(decisoes, simState);
      const prodEst = decisoes.pacote ? Math.round(c.prodReal) : null;
      const custoSc = c.custoPorSaca > 0 ? c.custoPorSaca : null;
      const finLabel = decisoes.financiamento ? FINANCIAMENTOS[decisoes.financiamento].label : '—';
      const pacoteLabel = decisoes.pacote ? PACOTES[decisoes.pacote].label : null;

      return (
        <div className="grid grid-cols-3 gap-2 text-[11px]">

                  <div className="flex justify-between pt-1 border-t border-[#2a2c1f]"><span className="text-[#D4A574]">Caixa atual</span><span className="text-[#D4A574]">{fmtBRL(c.caixa)}</span></div>

                {c.dividaAcumulada > 0 && (
                  <p className="mt-3 text-xs">⚠ Você também tem <strong className="text-[#C97B3F]">{fmtBRL(c.dividaAcumulada)}</strong> de dívida ({finLabel}) a quitar com a venda da safra.</p>
                )}
                <p className="text-[#b5b1a0] text-xs mt-3">Insumos e manejo só saem do caixa se você escolheu "à vista". Pronamp e barter são dívida, não saída.</p>
              </InfoTip>
            </div>
            <div className="font-mono text-[#E8E4D5]">{fmtBRL(c.caixa)}</div>

          {/* Custo por saca */}
          <div className="bg-[#15170e] border border-[#2a2c1f] rounded p-2">

            <Calendar size={10} /> Mercado · ago/2026
            <InfoTip title="O que é esse painel?">
              <p>É a fotografia real do mercado no dia em que você começa a safra. Esses seis indicadores definem todo o resto: quanto você vai gastar, quanto vai receber e qual o risco do ano.</p>
              <p>No simulador, esses valores são o ponto de partida. Daí pra frente, os eventos aleatórios mexem neles ao longo dos 11 meses da safra.</p>

            <div className="flex justify-between items-center">
              <span className="text-[#8a8a78] flex items-center">Spot MT
                <InfoTip title="Spot MT — preço físico em Mato Grosso">
                  <p><strong className="text-[#D4A574]">O que é</strong>: "spot" significa à vista, agora, na entrega imediata. É o preço real da saca no balcão da fazenda ou armazém em Sorriso/MT.</p>
                  <p><strong className="text-[#D4A574]">Por que importa</strong>: é o preço que você efetivamente embolsa se vende a soja hoje, sem hedge nem trava. Quando o jogador escolhe "vender na colheita", é por esse preço.</p>
                  <p><strong className="text-[#D4A574]">Como é formado</strong>: Spot = Futuro + Basis. Aqui: 133,02 + (−29,82) = 103,20.</p>
                </InfoTip>
              </span>
              <span className="text-[#E8E4D5]">{INITIAL_MARKET.spotMT.toFixed(2)}</span>
            </div>
            <div className="flex justify-between items-center">
              <span className="text-[#8a8a78] flex items-center">PTAX
                <InfoTip title="PTAX — taxa de câmbio oficial">
                  <p><strong className="text-[#D4A574]">O que é</strong>: taxa de câmbio (USD/BRL) calculada pelo Banco Central como média ponderada das negociações de dólar do dia. É a referência oficial do mercado.</p>
                  <p><strong className="text-[#D4A574]">Por que importa muito pro produtor</strong>: a soja é uma commodity dolarizada. O preço lá fora (Chicago) é em dólar. Quando o dólar sobe, a soja em reais sobe junto, mesmo sem mudar a cotação internacional.</p>
                  <p><strong className="text-[#D4A574]">Impacto prático</strong>: se o PTAX vai de 5,05 pra 5,45, sua saca pode subir R$ 5–8 só por isso. Se cai pra 4,75, sua receita encolhe.</p>
                </InfoTip>
              </span>
              <span className="text-[#E8E4D5]">{INITIAL_MARKET.ptax.toFixed(2)}</span>
            </div>
            <div className="flex justify-between items-center">
              <span className="text-[#8a8a78] flex items-center">Selic
                <InfoTip title="Selic — taxa básica de juros">
                  <p><strong className="text-[#D4A574]">O que é</strong>: taxa básica de juros do Brasil, definida pelo Copom (comitê do Banco Central) a cada 45 dias.</p>
                  <p><strong className="text-[#D4A574]">Por que importa</strong>: é a base do custo de crédito. Linhas de financiamento agrícola (Pronamp, custeio) são precificadas a partir dela. Selic alta = financiar a safra fica mais caro.</p>
                  <p><strong className="text-[#D4A574]">Impacto prático</strong>: a 14,50% a.a., um Pronamp de R$ 5 mi custa ~R$ 547 mil em juros até a colheita. Se Selic sobe pra 16%, esse custo vai pra ~R$ 605 mil.</p>

                  <p><strong className="text-[#D4A574]">Por que é negativo no MT</strong>: a soja produzida em Sorriso precisa percorrer 2.000+ km até o porto. Quem compra desconta o custo de frete + armazenagem + tempo. Por isso o basis fica negativo.</p>
                  <p><strong className="text-[#D4A574]">O que faz mexer</strong>: pico de safra (silo cheio, basis piora), frete (caminhão escasso, basis piora), demanda exportação (China comprando, basis melhora).</p>
                  <p><strong className="text-[#D4A574]">O número</strong>: −R$ 29,82/saca = a soja em Sorriso vale R$ 29,82 a menos que a referência B3.</p>

              <span className="text-[#E8E4D5]">{INITIAL_MARKET.basisMT.toFixed(2)}</span>

            <div className="flex justify-between items-center">
              <span className="text-[#8a8a78] flex items-center">CBOT
                <InfoTip title="CBOT — Chicago, a referência mundial">
                  <p><strong className="text-[#D4A574]">O que é</strong>: Chicago Board of Trade — a bolsa de commodities de Chicago. É a principal referência mundial de preço da soja, milho, trigo. Todo mundo no mercado global olha pra ela.</p>
                  <p><strong className="text-[#D4A574]">Por que importa pro Brasil</strong>: quando o CBOT sobe, a soja brasileira segue (com defasagem de horas e ajustes de prêmio). É o "mercado lá fora" puxando o preço aqui.</p>
                  <p><strong className="text-[#D4A574]">Unidade diferente</strong>: lá é em USD por <em>bushel</em> (≈27,2 kg), aqui é R$ por saca (60 kg). Conversão aproximada: CBOT × 60 ÷ 27,2 × PTAX = preço de paridade da saca.</p>
                  <p><strong className="text-[#D4A574]">Conta aqui</strong>: 11,99 × 60 ÷ 27,2 × 5,05 = ~R$ 133,58/saca de paridade (sem prêmio nem basis).</p>

              </span>
              <span className="text-[#E8E4D5]">{INITIAL_MARKET.cbot.toFixed(2)}</span>
            </div>
          </div>
        </div>
      );
    }

    function AgroGP() {
      const [fase, setFase] = useState('intro');
      const [enso, setEnso] = useState({ actual: null, forecast: null, confidence: null });
      const [decisoes, setDecisoes] = useState({
        area: 1000,
        capital: 6500000,
        pacote: null,
        financiamento: null,
        seguro: null,
        travado: null,
        plantio: null,
        manejo: null,
        venda: null
      });
      const [simState, setSimState] = useState({
        modProd: 1.0,
        modCbot: 1.0,
        modPtax: 1.0,
        modBasis: 0,
        custoExtra: 0,
        receitaFinanceira: 0
      });
      const [eventLog, setEventLog] = useState([]);
      const [faseEventos, setFaseEventos] = useState([]);

      // === SAFRINHA MILHO ===
      const [resultadoSoja, setResultadoSoja] = useState(null);
      const [decisoesMilho, setDecisoesMilho] = useState({
        pacoteMilho: null,
        manejoMilho: null,
        financiamentoMilho: null,
        travadoMilho: null,
        vendaMilho: null,
        janelaMilho: null
      });
      const [simStateMilho, setSimStateMilho] = useState({
        modProd: 1.0,
        modCbot: 1.0,
        modBasis: 0,
        custoExtra: 0,
        receitaFinanceira: 0
      });
      const [eventLogMilho, setEventLogMilho] = useState([]);

      const dre = useMemo(() => {
        if (fase !== 'dre' && fase !== 'transicao' && !fase.startsWith('milho-') && fase !== 'dre-milho' && fase !== 'dre-consolidado') return null;
        return calcularDRE(decisoes, simState);
      }, [fase, decisoes, simState]);

      // Caixa após DRE da soja (entra na safrinha)
      const caixaPosSoja = useMemo(() => {
        if (!resultadoSoja) return decisoes.capital;
        return decisoes.capital + resultadoSoja.lucro;
      }, [resultadoSoja, decisoes.capital]);

      const dreMilho = useMemo(() => {
        if (fase !== 'dre-milho' && fase !== 'dre-consolidado') return null;
        if (!decisoesMilho.pacoteMilho) return null;
        return calcularDREMilho(decisoesMilho, simStateMilho, caixaPosSoja, decisoes.area);
      }, [fase, decisoesMilho, simStateMilho, caixaPosSoja, decisoes.area]);

      function avancarFase(proxima) {
        const isMilho = proxima.startsWith('milho-');
        const stateRef = isMilho ? simStateMilho : simState;
        const setStateRef = isMilho ? setSimStateMilho : setSimState;
        const decisoesRef = isMilho ? decisoesMilho : decisoes;
        const setEventLogRef = isMilho ? setEventLogMilho : setEventLog;

        // Aplica deriva de mercado (random walk + sazonalidade do basis)
        let novoState = { ...stateRef };
        if (proxima !== 'dre' && proxima !== 'dre-milho' && proxima !== 'dre-consolidado' && !isMilho) {
          novoState = aplicarDeriva(novoState, proxima);
        } else if (isMilho && proxima.endsWith('-eventos')) {
          // Drift simples pro milho (sem sazonalidade detalhada por ora)
          const ptaxMove = (Math.random() - 0.5) * 0.04;
          const cbotMove = (Math.random() - 0.5) * 0.045;
          const basisMove = (Math.random() - 0.5) * 2.5;
          novoState.modCbot = (novoState.modCbot || 1) * (1 + cbotMove);
          novoState.modBasis = (novoState.modBasis || 0) + basisMove;
        }

        // Forecast só evolui no ciclo da soja (não na safrinha — já temos o regime real)
        if (!isMilho) {
          const novoEnso = atualizarForecast(enso, proxima);
          setEnso(novoEnso);
        }

        // Se for tela de eventos, rola eventos da fase base
        if (proxima.endsWith('-eventos')) {
          const faseBaseRaw = proxima.replace('-eventos', '');
          const faseBase = isMilho ? faseBaseRaw.replace('milho-', '') : faseBaseRaw;
          const commodity = isMilho ? 'milho' : 'soja';
          const novos = rolarEventosDaFase(faseBase, decisoesRef, enso.actual, commodity);
          novos.forEach(e => e.aplicar(novoState, decisoesRef));

          // Revisão de forecast só aparece em fases de soja (pré-colheita)
          const eventosFinais = [...novos];
          if (!isMilho) {
            const novoEnso = atualizarForecast(enso, proxima);
            if (novoEnso.revisedThisPhase && novoEnso.prevForecast) {
              const prevLabel = ENSO_REGIMES[novoEnso.prevForecast].label;
              const newLabel = ENSO_REGIMES[novoEnso.forecast].label;
              eventosFinais.unshift({
                id: 'forecast_revisado_' + Date.now(),
                titulo: 'Forecast climático revisado',
                desc: `Modelos meteorológicos atualizados. Agora indicam ${newLabel} (era ${prevLabel}). Confiança subiu pra ${novoEnso.confidence}%.`,
                icon: Info,
                tipo: 'mercado',
                impactoTexto: () => `Confiança ${novoEnso.confidence}% · ${newLabel}`,
                explicacao: 'Forecasts ENSO são atualizados mensalmente pelo CFS/NOAA, INMET e ECMWF. Conforme novos dados de temperatura do Pacífico chegam, os modelos refinam a previsão. Quanto mais próximo da floração, mais precisa fica a leitura do regime.'
              });
            }
          }

          if (isMilho) {
            setFaseEventos(eventosFinais);
            setEventLogRef(prev => [...prev, ...eventosFinais.map(e => ({ ...e, fase: faseBase }))]);
          } else {
            setFaseEventos(eventosFinais);
            setEventLog(prev => [...prev, ...eventosFinais.map(e => ({ ...e, fase: faseBase }))]);
          }
        } else {
          setFaseEventos([]);
        }

        // Rendimento Selic sobre caixa positivo durante a fase
        if (proxima.endsWith('-eventos') && MESES_POR_FASE[proxima]) {
          const meses = MESES_POR_FASE[proxima];
          const taxaFase = Math.pow(1 + SELIC_AA, meses / 12) - 1;
          const custos = isMilho
            ? calcularCustosAcumuladosMilho(decisoesRef, novoState, caixaPosSoja, decisoes.area)
            : calcularCustosAcumulados(decisoesRef, novoState);
          const caixaAtual = custos.caixa;
          if (caixaAtual > 0) {
            const rendimento = caixaAtual * taxaFase;
            novoState.receitaFinanceira = (novoState.receitaFinanceira || 0) + rendimento;
          }
        }

        setStateRef(novoState);
        setFase(proxima);
      }

      function resetar() {
        setFase('intro');
        setDecisoes({ area: 1000, capital: 6500000, pacote: null, financiamento: null, seguro: null, travado: null, plantio: null, manejo: null, venda: null });
        setSimState({ modProd: 1.0, modCbot: 1.0, modPtax: 1.0, modBasis: 0, custoExtra: 0, receitaFinanceira: 0 });
        setEnso({ actual: null, forecast: null, confidence: null });
        setEventLog([]);
        setFaseEventos([]);
        // Milho
        setResultadoSoja(null);
        setDecisoesMilho({ pacoteMilho: null, manejoMilho: null, financiamentoMilho: null, travadoMilho: null, vendaMilho: null, janelaMilho: null });
        setSimStateMilho({ modProd: 1.0, modCbot: 1.0, modBasis: 0, custoExtra: 0, receitaFinanceira: 0 });
        setEventLogMilho([]);
      }

      return (
        <div className="min-h-screen bg-[#0a0c07] text-[#E8E4D5]" style={{ fontFamily: "'Geist', 'Inter', system-ui, sans-serif" }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Geist:wght@400;500;600&display=swap');
            .font-display { font-family: 'Fraunces', serif; font-feature-settings: 'ss01'; }
            .font-mono { font-family: 'JetBrains Mono', monospace; }

            /* === TOOLTIP: tudo preto sobre branco, força sobre qualquer cor inline === */
            .tooltip-content,
            .tooltip-content p,
            .tooltip-content span,
            .tooltip-content div,
            .tooltip-content em { color: #000 !important; }
            .tooltip-content strong { color: #6b4d1f !important; font-weight: 700 !important; }
            .tooltip-content em { font-style: italic; color: #3a3a2e !important; }
            /* Caixas de cálculo internas: fundo cinza claro com borda */
            .tooltip-content [class*="bg-[#0f110a]"],
            .tooltip-content [class*="bg-[#15170e]"],
            .tooltip-content [class*="bg-[#1a1c12]"] {
              background-color: #f0ede2 !important;
              border: 1px solid #c8c4b5 !important;
            }
            .tooltip-content [class*="border-[#2a2c1f]"] { border-color: #c8c4b5 !important; }
            /* Indicadores de status mantém cor mas escurece pra ler em fundo branco */
            .tooltip-content [class*="text-[#8FB36B]"] { color: #2F5A1E !important; }
            .tooltip-content [class*="text-[#C97B3F]"] { color: #8B3A0F !important; }
            .tooltip-content [class*="text-[#C44536]"] { color: #8B1F1F !important; }
          `}</style>

          <div className="max-w-2xl mx-auto px-4 py-6">
            {/* Header */}
            <div className="mb-6">
              <div className="flex items-center justify-between mb-1">
                <h1 className="font-display text-2xl text-[#D4A574]" style={{ fontStyle: 'italic' }}>Agro GP</h1>
                {fase !== 'intro' && (
                  <button onClick={resetar} className="text-[#7a7a68] hover:text-[#E8E4D5] text-xs flex items-center gap-1">
                    <RotateCcw size={12} /> reiniciar
                  </button>
                )}
              </div>
              <div className="text-[#7a7a68] text-xs uppercase tracking-widest">Soja · Mato Grosso · Safra 2026/27</div>
            </div>

            {/* ====================== INTRO ====================== */}
            {fase === 'intro' && (
              <div className="space-y-6">
                <div className="bg-gradient-to-br from-[#1a1c12] to-[#15170e] border border-[#2a2c1f] rounded-lg p-5">
                  <Sprout className="text-[#D4A574] mb-3" size={28} />
                  <h2 className="font-display text-xl mb-3 leading-tight">Você é o produtor.</h2>
                  <p className="text-[#c8c4b5] text-sm leading-relaxed mb-3">
                    Mil hectares em Sorriso, MT. R$ 6,5 milhões de capital de giro. Uma safra inteira pela frente — do plantio à venda do físico.
                  </p>
                  <p className="text-[#c8c4b5] text-sm leading-relaxed">
                    Sete decisões. Eventos que você não controla. No fim, um DRE que diz se você acertou.
                  </p>
                  <div className="mt-4 pt-4 border-t border-[#2a2c1f]/60 flex items-start gap-2">
                    <Info size={14} className="text-[#D4A574] mt-0.5 flex-shrink-0" />
                    <p className="text-[#8a8a78] text-xs leading-snug">
                      Iniciante no agro? Procure o ícone <Info size={11} className="inline text-[#D4A574]" /> ao lado dos títulos pra entender cada conceito.
                    </p>
                  </div>
                </div>

            {/* ====================== MILHO — PACOTE TECNOLÓGICO ====================== */}

                <MonthLine fase={fase} />

                <MonthLine fase={fase} />

                <CalendarioSazonal fase={fase} commodity="milho" />
                <StatBarMilho decisoesMilho={decisoesMilho} simStateMilho={simStateMilho} caixaInicial={caixaPosSoja} area={decisoes.area} />
                <MarketBarMilho simStateMilho={simStateMilho} />

                      <p><strong className="text-[#D4A574]">Lagarta-do-cartucho</strong> (Spodoptera frugiperda): ataca a folha. Bt resiste melhor, pacote básico sofre.</p>
                      <p>Eficácia do manejo: reativo 35% → preventivo 72% → premium 90%. Cada % de eficácia a mais reduz a perda na proporção do dano potencial.</p>

                  </Card>

                <button

                decisoesSoja={decisoes}
