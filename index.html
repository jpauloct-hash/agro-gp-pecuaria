      const titulos = {
        'plantio-eventos': { titulo: 'Plantio em andamento', mes: 'Set–Nov', fase: 'plantio' },
        'vegetativo-eventos': { titulo: 'Vegetativo / Floração', mes: 'Dez–Jan', fase: 'vegetativo' },
        'enchimento-eventos': { titulo: 'Enchimento de grão', mes: 'Jan–Fev', fase: 'enchimento' },
        'colheita-eventos': { titulo: 'Colheita', mes: 'Fev–Abr', fase: 'colheita' },
        'comercializacao-eventos': { titulo: 'Comercialização', mes: 'Fev–Jul', fase: 'comercializacao' }
      };
      const meta = titulos[fase];
      return (
        <div className="space-y-4">
          <FaseHeader fase={meta.fase} />
          <MonthLine fase={fase} />

          <CalendarioSazonal fase={fase} />
          <ForecastChip enso={enso} />
          <StatBar decisoes={decisoes} simState={simState} />
          <MarketBar simState={simState} />
          <div className="mt-2">
            <div className="text-[#7a7a68] text-[10px] uppercase tracking-widest mb-1">{meta.mes}</div>
            <h2 className="font-display text-xl text-[#E8E4D5]">{meta.titulo}</h2>
          </div>

          {eventos.length === 0 && (
            <div className="bg-[#15170e] border border-[#2a2c1f] rounded p-4 text-center">
              <CheckCircle2 className="text-[#8FB36B] mx-auto mb-2" size={20} />
              <div className="text-[#c8c4b5] text-sm">Sem ocorrências relevantes nesta fase.</div>
            </div>
          )}

          {eventos.length > 0 && (
            <div>
              <div className="text-[#7a7a68] text-[10px] uppercase tracking-widest mb-2">Ocorrências</div>
              {eventos.map(e => <EventoCard key={e.id} evento={e} decisoes={decisoes} />)}
            </div>
          )}

          <button onClick={onContinuar} className="w-full bg-[#D4A574] hover:bg-[#E8B547] text-[#1a1a13] font-medium py-3 rounded-lg flex items-center justify-center gap-2 transition-colors">
            {labelBotao || 'continuar'} <ArrowRight size={16} />
          </button>
        </div>
      );
    }

    // ============================================================
    // TELA DE DRE FINAL
    // ============================================================
    function DREScreen({ dre, decisoes, eventLog, onReset, onContinuarSafrinha, simState, enso }) {
      const positivo = dre.lucro > 0;

      return (
        <div className="space-y-5">
          <FaseHeader fase="dre" />
          <MonthLine fase="dre" />
          <ForecastChip enso={enso} />
          <MarketBar simState={simState} />

          <div className={`rounded-lg p-5 border ${positivo ? 'bg-gradient-to-br from-[#1f2517] to-[#15170e] border-[#8FB36B]/40' : 'bg-gradient-to-br from-[#25171a] to-[#15170e] border-[#C44536]/40'}`}>
            <div className="text-[#7a7a68] text-[10px] uppercase tracking-widest mb-1">Resultado da safra 25/26</div>
            <div className="flex items-baseline justify-between mb-3">
              <div className={`font-display text-3xl ${positivo ? 'text-[#8FB36B]' : 'text-[#C44536]'}`} style={{ fontStyle: 'italic' }}>
                {fmtBRL(dre.lucro)}
              </div>
              <div className={`text-xs font-mono ${positivo ? 'text-[#8FB36B]' : 'text-[#C44536]'} flex items-center`}>
                ROE {fmtPct(dre.roe)}
                <InfoTip title="ROE — Retorno sobre o capital">
                  <p>Quanto sua safra rendeu em cima do capital que você investiu nela. É a "rentabilidade" do esforço da safra inteira.</p>
                  <p>ROE = Lucro ÷ Capital investido.</p>
                  <p>No simulador, o capital é o caixa que você usou de capital de giro ({fmtBRL(decisoes.capital)}). Se o lucro foi {fmtBRL(dre.lucro)}, o ROE é {fmtPct(dre.roe)}.</p>
                  <p className="text-[#b5b1a0] text-xs mt-3">Pra comparar: CDI numa safra (~10–11% a.a.) é o piso. Um ROE de 25%+ é uma safra muito boa. ROE negativo = você perdeu dinheiro.</p>
                </InfoTip>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-2 text-xs font-mono">
              <div className="bg-[#0f110a]/60 rounded p-2">
                <div className="text-[#7a7a68] text-[9px] uppercase tracking-wider">Lucro/ha</div>
                <div className="text-[#E8E4D5] text-sm">{fmtBRL(dre.lucroHa)}</div>
              </div>
              <div className="bg-[#0f110a]/60 rounded p-2">
                <div className="text-[#7a7a68] text-[9px] uppercase tracking-wider">Produtividade</div>
                <div className="text-[#E8E4D5] text-sm">{dre.prodReal.toFixed(1)} sc/ha</div>
              </div>
            </div>
            {dre.prodFrustrada && (
              <div className="mt-3 flex items-center gap-2 text-xs text-[#C97B3F]">
                <AlertTriangle size={12} /> Safra frustrada — seguro acionado.
              </div>
            )}
          </div>

          {/* Decomposição da Receita */}
          <div>
            <h3 className="font-display text-lg mb-2 text-[#D4A574]">
              Receita
              <InfoTip title="Como a receita é formada">
                <p>Sua soja produzida foi vendida em duas partes:</p>
                <p><strong className="text-[#D4A574]">Travado antecipado</strong>: a parte que você fixou preço lá no setup, antes mesmo de plantar. Esse preço já estava garantido — não importa o que aconteceu depois.</p>
                <p><strong className="text-[#D4A574]">Físico vendido</strong>: a parte que ficou "livre". Foi vendida ao preço de mercado do momento (spot na colheita, ou na entressafra se você armazenou).</p>
                <p><strong className="text-[#D4A574]">Indenização de seguro</strong>: se sua produtividade caiu mais de 30% do potencial, o seguro pagou parte do prejuízo.</p>
                <p className="text-[#b5b1a0] text-xs mt-3">A magia tá em combinar bem: travar uma parte (proteção) e deixar outra livre (chance de upside).</p>
              </InfoTip>
            </h3>
            <div className="bg-[#15170e] border border-[#2a2c1f] rounded">
              <RowDRE label="Sacas produzidas" sub={`${dre.prodReal.toFixed(1)} sc/ha × ${decisoes.area} ha`} value={fmtSacas(dre.sacasTotal)} mono />
              <RowDRE
                label={<span className="inline-flex items-center">Travado antecipado ({(decisoes.travado*100).toFixed(0)}%)
                  <InfoTip title="Receita do travamento antecipado">
                    <p>Você comprometeu entregar <strong>{fmtSacas(dre.sacasComprometidas)}</strong> ao preço fixado em agosto.</p>
                    <div className="bg-[#0f110a] rounded p-2 font-mono text-xs mt-2 space-y-1">
                      <div className="flex justify-between"><span className="text-[#8a8a78]">Esperado produzir</span><span>{fmtSacas(dre.sacasEsperadas)}</span></div>
                      <div className="flex justify-between"><span className="text-[#8a8a78]">× {(decisoes.travado*100).toFixed(0)}% travado</span><span>{fmtSacas(dre.sacasComprometidas)}</span></div>
                      <div className="flex justify-between"><span className="text-[#8a8a78]">× preço travado</span><span>{fmtBRL(dre.precoTravado, 2)}</span></div>
                      <div className="flex justify-between pt-1 border-t border-[#2a2c1f]"><span className="text-[#D4A574]">Receita</span><span className="text-[#D4A574]">{fmtBRL(dre.receitaTravada)}</span></div>
                    </div>
                    <p className="text-[#b5b1a0] text-xs mt-3">O contrato é quantidade fixa — não importa o que você efetivamente produziu, o comprador exige as sacas comprometidas.</p>
                  </InfoTip>
                </span>}
                sub={`${fmtSacas(dre.sacasComprometidas)} × ${fmtBRL(dre.precoTravado, 2)}`}
                value={fmtBRL(dre.receitaTravada)}
              />
              <RowDRE label="Físico livre vendido" sub={`${fmtSacas(dre.sacasLivres)} × ${fmtBRL(dre.precoMedioLivre, 2)}`} value={fmtBRL(dre.receitaLivre)} />
              {dre.indenizacao > 0 && <RowDRE label="Indenização de seguro" value={fmtBRL(dre.indenizacao)} positivo />}
              <RowDRE label="Receita bruta" value={fmtBRL(dre.receitaBruta)} total />
            </div>
          </div>

          {/* Custos */}
          <div>
            <h3 className="font-display text-lg mb-2 text-[#D4A574]">
              Custos
              <InfoTip title="Como os custos são formados">
                <p>Os custos da safra se dividem em cinco grupos, cada um com lógica própria:</p>
                <p><strong className="text-[#D4A574]">Insumos</strong>: o pacote tecnológico × área plantada.</p>
                <p><strong className="text-[#D4A574]">Manejo fito</strong>: o programa de defensivos × área.</p>
                <p><strong className="text-[#D4A574]">Seguro</strong>: prêmio (% do custo de insumos) cobrado pela seguradora.</p>
                <p><strong className="text-[#D4A574]">Custos extras (clima)</strong>: gastos não planejados gerados por eventos (replantio, operações extras).</p>
                <p><strong className="text-[#D4A574]">Custo financeiro</strong>: juros do financiamento ou ágio do barter sobre os insumos+manejo.</p>
              </InfoTip>
            </h3>
            <div className="bg-[#15170e] border border-[#2a2c1f] rounded">
              <RowDRE
                label={<span className="inline-flex items-center">Insumos
                  <InfoTip title="Custo de insumos">
                    <p>Sementes, adubo, defensivos e tratamento — o pacote tecnológico que você escolheu, multiplicado pela área plantada.</p>
                    <div className="bg-[#0f110a] rounded p-2 font-mono text-xs mt-2 space-y-1">
                      <div className="flex justify-between"><span className="text-[#8a8a78]">Pacote {PACOTES[decisoes.pacote].label}</span><span>{fmtBRL(PACOTES[decisoes.pacote].custoHa)}/ha</span></div>
                      <div className="flex justify-between"><span className="text-[#8a8a78]">× Área</span><span>{decisoes.area} ha</span></div>
                      <div className="flex justify-between pt-1 border-t border-[#2a2c1f]"><span className="text-[#D4A574]">Total</span><span className="text-[#D4A574]">{fmtBRL(dre.custoInsumos)}</span></div>
                    </div>
                  </InfoTip>
                </span>}
                value={`(${fmtBRL(dre.custoInsumos)})`} negativo
              />
              <RowDRE
                label={<span className="inline-flex items-center">Manejo fito
                  <InfoTip title="Custo do manejo fitossanitário">
                    <p>Aplicações extras de fungicida e inseticida, além do que já está no pacote básico. Programa preventivo ou premium adiciona custo, mas reduz perdas por ferrugem, lagarta e percevejo.</p>
                    <div className="bg-[#0f110a] rounded p-2 font-mono text-xs mt-2 space-y-1">
                      <div className="flex justify-between"><span className="text-[#8a8a78]">Programa {MANEJOS[decisoes.manejo].label}</span><span>{fmtBRL(MANEJOS[decisoes.manejo].custoHa)}/ha</span></div>
                      <div className="flex justify-between"><span className="text-[#8a8a78]">× Área</span><span>{decisoes.area} ha</span></div>
                      <div className="flex justify-between pt-1 border-t border-[#2a2c1f]"><span className="text-[#D4A574]">Total</span><span className="text-[#D4A574]">{fmtBRL(dre.custoManejo)}</span></div>
                    </div>
                  </InfoTip>
                </span>}
                value={`(${fmtBRL(dre.custoManejo)})`} negativo
              />
              <RowDRE
                label={<span className="inline-flex items-center">Seguro
                  <InfoTip title="Custo do seguro agrícola">
                    <p>Prêmio que você pagou pra ter cobertura caso a safra quebrasse. Pago integralmente, mesmo em ano bom.</p>
                    <div className="bg-[#0f110a] rounded p-2 font-mono text-xs mt-2 space-y-1">
                      <div className="flex justify-between"><span className="text-[#8a8a78]">{SEGUROS[decisoes.seguro].label}</span><span>{(SEGUROS[decisoes.seguro].custoPct*100).toFixed(1)}%</span></div>
                      <div className="flex justify-between"><span className="text-[#8a8a78]">× Custo de insumos</span><span>{fmtBRL(dre.custoInsumos)}</span></div>
                      <div className="flex justify-between pt-1 border-t border-[#2a2c1f]"><span className="text-[#D4A574]">Total</span><span className="text-[#D4A574]">{fmtBRL(dre.custoSeguro)}</span></div>
                    </div>
                    {dre.indenizacao > 0 && <p className="text-xs text-[#8FB36B] mt-2">✓ Indenização recebida: {fmtBRL(dre.indenizacao)} (aparece na receita).</p>}
                  </InfoTip>
                </span>}
                value={`(${fmtBRL(dre.custoSeguro)})`} negativo
              />
              <RowDRE
                label={<span className="inline-flex items-center">Custos extras (clima)
                  <InfoTip title="Custos extras gerados por eventos">
                    <p>Gastos não planejados que aparecem por causa de eventos do clima — replantio, operações extras de aplicação, secagem de grão úmido.</p>
                    {dre.custoExtra > 0 ? (
                      <div className="bg-[#0f110a] rounded p-2 font-mono text-xs mt-2 space-y-1">
                        <div className="flex justify-between"><span className="text-[#8a8a78]">R$ {(dre.custoExtra / decisoes.area).toFixed(0)}/ha</span><span>× {decisoes.area} ha</span></div>
                        <div className="flex justify-between pt-1 border-t border-[#2a2c1f]"><span className="text-[#D4A574]">Total</span><span className="text-[#D4A574]">{fmtBRL(dre.custoExtra)}</span></div>
                      </div>
                    ) : (
                      <p className="text-[#8FB36B] text-xs mt-2">✓ Nenhum evento gerou custo extra nessa safra.</p>
                    )}
                  </InfoTip>
                </span>}
                value={`(${fmtBRL(dre.custoExtra)})`} negativo
              />
              <RowDRE
                label={<span className="inline-flex items-center">Custo financeiro
                  <InfoTip title="Custo financeiro do financiamento">
                    <p>Juros do Pronamp ou ágio do barter sobre o valor financiado. Cobrado apenas sobre insumos e manejo (seguro é pago à vista).</p>
                    <div className="bg-[#0f110a] rounded p-2 font-mono text-xs mt-2 space-y-1">
                      <div className="flex justify-between"><span className="text-[#8a8a78]">{FINANCIAMENTOS[decisoes.financiamento].label}</span><span>{(FINANCIAMENTOS[decisoes.financiamento].custoFin*100).toFixed(1)}%</span></div>
                      <div className="flex justify-between"><span className="text-[#8a8a78]">× (Insumos + Manejo)</span><span>{fmtBRL(dre.custoInsumos + dre.custoManejo)}</span></div>
                      <div className="flex justify-between pt-1 border-t border-[#2a2c1f]"><span className="text-[#D4A574]">Total</span><span className="text-[#D4A574]">{fmtBRL(dre.custoFinanceiro)}</span></div>
                    </div>
                    {decisoes.financiamento === 'avista' && <p className="text-[#8FB36B] text-xs mt-2">✓ À vista = sem custo financeiro.</p>}
                  </InfoTip>
                </span>}
                value={`(${fmtBRL(dre.custoFinanceiro)})`} negativo
              />
              {dre.custoBackup > 0 && (
                <RowDRE
                  label={<span className="inline-flex items-center text-[#C44536]">⚠ Backup contratual
                    <InfoTip title="Backup contratual — quebra de hedge">
                      <p>Você travou mais sacas do que conseguiu produzir. Pra honrar o contrato, teve que <strong>comprar soja no mercado</strong> ao preço spot atual.</p>
                      <div className="bg-[#0f110a] rounded p-2 font-mono text-xs mt-2 space-y-1">
                        <div className="flex justify-between"><span className="text-[#8a8a78]">Comprometido entregar</span><span>{fmtSacas(dre.sacasComprometidas)}</span></div>
                        <div className="flex justify-between"><span className="text-[#8a8a78]">Produziu</span><span>{fmtSacas(dre.sacasTotal)}</span></div>
                        <div className="flex justify-between"><span className="text-[#C44536]">Faltou</span><span className="text-[#C44536]">{fmtSacas(dre.sacasFaltantes)}</span></div>
                        <div className="flex justify-between"><span className="text-[#8a8a78]">× preço spot</span><span>{fmtBRL(dre.precoSpot, 2)}</span></div>
                        <div className="flex justify-between pt-1 border-t border-[#2a2c1f]"><span className="text-[#C44536]">Backup</span><span className="text-[#C44536]">{fmtBRL(dre.custoBackup)}</span></div>
                      </div>
                      <p className="text-[#b5b1a0] text-xs mt-3">Isso é o "preço" de hedge agressivo em ano ruim. Se o forecast indicava risco e você travou mais de 50% mesmo assim, o resultado é esse.</p>
                    </InfoTip>
                  </span>}
                  value={`(${fmtBRL(dre.custoBackup)})`}
                  negativo
                />
              )}
              <RowDRE label="Custo total" value={`(${fmtBRL(dre.custoTotal)})`} total />
            </div>
          </div>

          {/* Resultado financeiro: rendimento do caixa pela Selic */}
          <div>
            <h3 className="font-display text-lg mb-2 text-[#D4A574]">
              Resultado financeiro
              <InfoTip title="Rendimento do caixa parado (Selic)">
                <p>Dinheiro parado em conta corrente perde poder de compra. Mas alocado em CDB, LCA ou Tesouro Selic <strong>rende próximo à Selic</strong> (hoje 14,5% a.a.).</p>
                <p>O simulador aplica a Selic <strong>fase a fase</strong> sobre o caixa positivo. Quando o caixa fica negativo (por exemplo, após pagamento à vista de insumos), o rendimento naquela fase é zero.</p>
                <div className="bg-[#0f110a] rounded p-2 font-mono text-xs mt-2 space-y-1">
                  <div className="flex justify-between"><span className="text-[#8a8a78]">Capital inicial</span><span>{fmtBRL(decisoes.capital)}</span></div>
                  <div className="flex justify-between"><span className="text-[#8a8a78]">Selic a.a.</span><span>{(SELIC_AA * 100).toFixed(1)}%</span></div>
                  <div className="flex justify-between pt-1 border-t border-[#2a2c1f]"><span className="text-[#D4A574]">Rendimento total acumulado</span><span className="text-[#8FB36B]">{fmtBRL(dre.rendimentoCaixa)}</span></div>
                </div>
                <p className="text-[#b5b1a0] text-xs mt-3">
                  <strong className="text-[#D4A574]">À vista</strong>: caixa cai rápido — pouca remuneração nas fases seguintes.
                  <br/><strong className="text-[#D4A574]">Pronamp/Barter</strong>: caixa preservado durante o ciclo — Selic rende mais.
                </p>
                <p className="text-[#b5b1a0] text-xs mt-2">É por isso que muitos produtores grandes preferem financiar mesmo tendo caixa: o spread entre Pronamp (~18%) e Selic (14,5%) é só ~3,5pp, enquanto à vista esvazia a remuneração.</p>
              </InfoTip>
            </h3>
            <div className="bg-[#15170e] border border-[#2a2c1f] rounded">
              <RowDRE label={`Rendimento do caixa (Selic ${(SELIC_AA * 100).toFixed(1)}% a.a.)`} sub="acumulado fase a fase sobre caixa positivo" value={fmtBRL(dre.rendimentoCaixa)} positivo />
            </div>
          </div>

          {/* Mercado final */}
          <div>
            <h3 className="font-display text-lg mb-2 text-[#D4A574]">
              Mercado no fechamento
              <InfoTip title="Mercado no fechamento">
                <p>É a "fotografia" do mercado da soja no momento em que a sua safra terminou — pra você comparar com o que escolheu lá atrás.</p>
                <p><strong className="text-[#D4A574]">Futuro final</strong>: cotação do contrato futuro da soja na B3 no fechamento da safra. É a referência nacional, em R$ por saca de 60kg.</p>
                <p><strong className="text-[#D4A574]">Spot MT</strong>: preço físico real em Sorriso/MT. Sempre menor que o futuro porque a soja precisa ser transportada até o porto. <em>Spot = Futuro + Basis</em>.</p>
                <p><strong className="text-[#D4A574]">Basis final</strong>: a "diferença regional" naquele momento. Quanto vale a soja em Sorriso vs a referência B3. Quando frete sobe ou silo enche, o basis fica mais negativo.</p>
                <p><strong className="text-[#D4A574]">vs travado</strong>: comparação entre o preço que você travou no setup e o spot atual. Se o spot terminou mais baixo que o seu travamento, você "travou bem" — vendeu mais caro do que conseguiria hoje. Se o spot subiu acima do travado, você perdeu upside.</p>
                <p className="text-[#b5b1a0] text-xs mt-3">Exemplo: você travou em R$118 lá no início. O spot terminou em R$111. Você ganhou R$7 por saca vs vender hoje. ✓ Travou bem.</p>
              </InfoTip>
            </h3>
            <div className="bg-[#0f110a] border border-[#2a2c1f] rounded p-3 font-mono text-xs grid grid-cols-2 gap-x-3 gap-y-1.5">
              <div className="flex justify-between"><span className="text-[#8a8a78]">Futuro final</span><span className="text-[#E8E4D5]">{dre.futuroFinal.toFixed(2)}</span></div>
              <div className="flex justify-between"><span className="text-[#8a8a78]">Spot MT</span><span className="text-[#E8E4D5]">{dre.precoSpot.toFixed(2)}</span></div>
              <div className="flex justify-between"><span className="text-[#8a8a78]">Basis final</span><span className="text-[#E8E4D5]">{dre.basisFinal.toFixed(2)}</span></div>
              <div className="flex justify-between"><span className="text-[#8a8a78]">vs travado</span><span className={dre.precoSpot > dre.precoTravado ? 'text-[#C44536]' : 'text-[#8FB36B]'}>{dre.precoSpot > dre.precoTravado ? 'perdeu upside' : 'travou bem'}</span></div>
            </div>
          </div>

          {/* Histórico de eventos */}
          <div>
            <h3 className="font-display text-lg mb-2 text-[#D4A574]">A safra em eventos</h3>
            {eventLog.length === 0 ? (
              <div className="text-[#7a7a68] text-sm">Safra sem grandes surpresas.</div>
            ) : (
              <div className="space-y-1">
                {eventLog.map((e, i) => (
                  <div key={i} className="flex items-start gap-2 text-xs py-1.5 border-b border-[#2a2c1f]/50 last:border-0">
                    <e.icon size={12} className="mt-0.5 flex-shrink-0" style={{ color: TIPO_COR[e.tipo] }} />
                    <div className="flex-1 text-[#c8c4b5]">{e.titulo}</div>
                    <div className="text-[#5a5a4e] font-mono text-[10px] uppercase">{e.fase}</div>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div className="space-y-2 pt-2">
            <button onClick={onContinuarSafrinha} className="w-full bg-[#D4A574] hover:bg-[#E8B547] text-[#1a1a13] font-medium py-3 rounded-lg flex items-center justify-center gap-2 transition-colors">
              Continuar pra safrinha <ArrowRight size={16} />
            </button>
            <button onClick={onReset} className="w-full bg-transparent border border-[#3a3a2e] hover:bg-[#15170e] text-[#8a8a78] font-medium py-2.5 rounded-lg flex items-center justify-center gap-2 transition-colors text-sm">
              <RotateCcw size={14} /> jogar outra safra
            </button>
          </div>
        </div>
      );
    }

    function RowDRE({ label, sub, value, total, negativo, positivo, mono }) {
      return (
        <div className={`flex justify-between items-baseline px-3 py-2.5 border-b border-[#2a2c1f]/60 last:border-0 ${total ? 'bg-[#1a1c12]' : ''}`}>
          <div className="flex-1 min-w-0">
            <div className={`text-sm ${total ? 'text-[#E8E4D5] font-medium' : 'text-[#c8c4b5]'}`}>{label}</div>
            {sub && <div className="text-[10px] text-[#7a7a68] font-mono mt-0.5">{sub}</div>}
          </div>
          <div className={`font-mono text-sm ${total ? 'text-[#D4A574] font-medium' : negativo ? 'text-[#C97B3F]' : positivo ? 'text-[#8FB36B]' : 'text-[#E8E4D5]'}`}>
            {value}
          </div>
        </div>
      );
    }

    // ============================================================
    // FASE DE EVENTOS — MILHO
    // ============================================================
    function FaseEventosScreenMilho({ fase, decisoesMilho, simStateMilho, eventos, caixaInicial, area, onContinuar, labelBotao }) {
      const titulos = {
        'milho-vegetativo-eventos':       { titulo: 'Vegetativo do milho',     mes: 'Fev–Mar 2027',  fase: 'vegetativo' },
        'milho-enchimento-eventos':       { titulo: 'Enchimento de grão',       mes: 'Abr–Mai 2027',  fase: 'enchimento' },
        'milho-colheita-eventos':         { titulo: 'Colheita do milho',        mes: 'Jun–Jul 2027',  fase: 'colheita' },
        'milho-comercializacao-eventos':  { titulo: 'Comercialização do milho', mes: 'Jul–Out 2027',  fase: 'comerc' }
      };
      const meta = titulos[fase];
      return (
        <div className="space-y-4">
          <FaseHeaderMilho fase={meta.fase} />
          <MonthLine fase={fase} />

          <CalendarioSazonal fase={fase} commodity="milho" />
          <StatBarMilho decisoesMilho={decisoesMilho} simStateMilho={simStateMilho} caixaInicial={caixaInicial} area={area} />
          <MarketBarMilho simStateMilho={simStateMilho} />
          <div className="mt-2">
            <div className="text-[#7a7a68] text-[10px] uppercase tracking-widest mb-1">{meta.mes}</div>
            <h2 className="font-display text-xl text-[#E8E4D5]">{meta.titulo}</h2>
          </div>

          {eventos.length === 0 && (
            <div className="bg-[#15170e] border border-[#2a2c1f] rounded p-4 text-center">
              <CheckCircle2 className="text-[#8FB36B] mx-auto mb-2" size={20} />
              <div className="text-[#c8c4b5] text-sm">Sem ocorrências relevantes nesta fase.</div>
            </div>
          )}

          {eventos.length > 0 && (
            <div>
              <div className="text-[#7a7a68] text-[10px] uppercase tracking-widest mb-2">Ocorrências</div>
              {eventos.map(e => <EventoCard key={e.id} evento={e} decisoes={decisoesMilho} />)}
            </div>
          )}

          <button onClick={onContinuar} className="w-full bg-[#D4A574] hover:bg-[#E8B547] text-[#1a1a13] font-medium py-3 rounded-lg flex items-center justify-center gap-2 transition-colors">
            {labelBotao || 'continuar'} <ArrowRight size={16} />
          </button>
        </div>
      );
    }

    // ============================================================
    // DRE MILHO
    // ============================================================
    function DREMilhoScreen({ dreMilho, decisoesMilho, decisoesSoja, eventLogMilho, simStateMilho, caixaInicial, onContinuar }) {
      const pacote = PACOTES_MILHO[decisoesMilho.pacoteMilho];
      const manejo = MANEJOS_MILHO[decisoesMilho.manejoMilho];
      const fin = FINANCIAMENTOS_MILHO[decisoesMilho.financiamentoMilho];

      return (
        <div className="space-y-5">
          <FaseHeaderMilho fase="dre" />
          <MonthLine fase="dre-milho" />

          {/* Resultado */}
          <div className="bg-gradient-to-br from-[#1a1c12] to-[#15170e] border border-[#2a2c1f] rounded-lg p-5">
            <Wheat className="text-[#D4A574] mb-2" size={22} />
            <div className="text-[#7a7a68] text-[10px] uppercase tracking-widest mb-1">DRE safrinha — milho</div>
            <div className="flex items-baseline justify-between">
              <div>
                <div className="text-[#7a7a68] text-xs mb-0.5">Lucro do milho</div>
                <div className={`font-display text-3xl ${dreMilho.lucro >= 0 ? 'text-[#8FB36B]' : 'text-[#C44536]'}`} style={{ fontStyle: 'italic' }}>{fmtBRL(dreMilho.lucro)}</div>
              </div>
              <div className={`text-xs font-mono ${dreMilho.lucro >= 0 ? 'text-[#8FB36B]' : 'text-[#C44536]'}`}>
                {fmtBRL(dreMilho.lucroHa)}/ha
              </div>
            </div>
            <div className="grid grid-cols-2 gap-2 text-xs font-mono mt-3">
              <div className="bg-[#0f110a]/60 rounded p-2">
                <div className="text-[#7a7a68] text-[9px] uppercase tracking-wider">Produtividade</div>
                <div className="text-[#E8E4D5] text-sm">{dreMilho.prodReal.toFixed(1)} sc/ha</div>
              </div>
              <div className="bg-[#0f110a]/60 rounded p-2">
                <div className="text-[#7a7a68] text-[9px] uppercase tracking-wider">Caixa final</div>
                <div className="text-[#E8E4D5] text-sm">{fmtBRL(dreMilho.caixaFinal)}</div>
              </div>
            </div>
          </div>

          {/* Receita */}
          <div>
            <h3 className="font-display text-lg mb-2 text-[#D4A574]">Receita</h3>
            <div className="bg-[#15170e] border border-[#2a2c1f] rounded">
              <RowDRE label="Sacas produzidas" sub={`${dreMilho.prodReal.toFixed(1)} sc/ha × ${decisoesSoja.area} ha`} value={fmtSacas(dreMilho.sacasTotal)} mono />
              <RowDRE
                label={`Travado antecipado (${(decisoesMilho.travadoMilho*100).toFixed(0)}%)`}
                sub={`${fmtSacas(dreMilho.sacasComprometidas)} × ${fmtBRL(dreMilho.precoTravado, 2)}`}
                value={fmtBRL(dreMilho.receitaTravada)}
              />
              <RowDRE label="Físico livre vendido" sub={`${fmtSacas(dreMilho.sacasLivres)} × ${fmtBRL(dreMilho.precoMedioLivre, 2)}`} value={fmtBRL(dreMilho.receitaLivre)} />
              <RowDRE label="Receita bruta" value={fmtBRL(dreMilho.receitaBruta)} total />
            </div>
          </div>

          {/* Custos */}
          <div>
            <h3 className="font-display text-lg mb-2 text-[#D4A574]">Custos</h3>
            <div className="bg-[#15170e] border border-[#2a2c1f] rounded">
              <RowDRE label={`Insumos (${pacote.label})`} sub={`${fmtBRL(pacote.custoHa)}/ha × ${decisoesSoja.area} ha`} value={`(${fmtBRL(dreMilho.custoInsumos)})`} negativo />
              <RowDRE label={`Manejo fito (${manejo.label})`} sub={`${fmtBRL(manejo.custoHa)}/ha × ${decisoesSoja.area} ha`} value={`(${fmtBRL(dreMilho.custoManejo)})`} negativo />
              {dreMilho.custoExtra > 0 && <RowDRE label="Custos extras (eventos)" value={`(${fmtBRL(dreMilho.custoExtra)})`} negativo />}
              <RowDRE label={`Custo financeiro (${fin.label})`} sub={`${(fin.custoFin*100).toFixed(1)}% sobre insumos+manejo`} value={`(${fmtBRL(dreMilho.custoFinanceiro)})`} negativo />
              {dreMilho.custoBackup > 0 && (
                <RowDRE
                  label={<span className="text-[#C44536]">⚠ Backup contratual</span>}
                  sub={`${fmtSacas(dreMilho.sacasFaltantes)} compradas no spot`}
                  value={`(${fmtBRL(dreMilho.custoBackup)})`}
                  negativo
                />
              )}
              <RowDRE label="Custo total" value={`(${fmtBRL(dreMilho.custoTotal)})`} total />
            </div>
          </div>

          {/* Resultado financeiro */}
          <div>
            <h3 className="font-display text-lg mb-2 text-[#D4A574]">
              Resultado financeiro
              <InfoTip title="Rendimento do caixa da safrinha (Selic)">
                <p>Mesma lógica da soja: o caixa pós-soja, alocado em CDB/Tesouro Selic, rende Selic <strong>fase a fase</strong> durante a safrinha (~9 meses). Quando o caixa fica negativo, o rendimento daquela fase é zero.</p>
                <div className="bg-[#0f110a] rounded p-2 font-mono text-xs mt-2 space-y-1">
                  <div className="flex justify-between"><span className="text-[#8a8a78]">Caixa inicial (pós-soja)</span><span>{fmtBRL(caixaInicial)}</span></div>
                  <div className="flex justify-between"><span className="text-[#8a8a78]">Selic a.a.</span><span>{(SELIC_AA * 100).toFixed(1)}%</span></div>
                  <div className="flex justify-between pt-1 border-t border-[#2a2c1f]"><span className="text-[#D4A574]">Rendimento total acumulado</span><span className="text-[#8FB36B]">{fmtBRL(dreMilho.rendimentoCaixa)}</span></div>
                </div>
                <p className="text-[#b5b1a0] text-xs mt-3">Em pousio, esse rendimento ainda existe e fica visível no DRE consolidado: o produtor que não planta safrinha rentabiliza o caixa pela Selic enquanto a área descansa.</p>
              </InfoTip>
            </h3>
            <div className="bg-[#15170e] border border-[#2a2c1f] rounded">
              <RowDRE label={`Rendimento do caixa (Selic ${(SELIC_AA * 100).toFixed(1)}% a.a.)`} sub="acumulado fase a fase sobre caixa positivo" value={fmtBRL(dreMilho.rendimentoCaixa)} positivo />
            </div>
          </div>
          <div className="bg-[#0f110a] border border-[#2a2c1f] rounded p-3 text-xs text-[#8a8a78] flex items-start gap-2">
            <Info size={12} className="text-[#7a7a68] mt-0.5 flex-shrink-0" />
            <p className="leading-snug">A safrinha não tem seguro nessa simulação — produtor MT raramente segura milho safrinha pelo custo do prêmio em relação à margem.</p>
          </div>

          {/* Histórico de eventos */}
          <div>
            <h3 className="font-display text-lg mb-2 text-[#D4A574]">A safrinha em eventos</h3>
            {eventLogMilho.length === 0 ? (
              <div className="text-[#7a7a68] text-sm">Safrinha sem grandes ocorrências.</div>
            ) : (
              <div className="space-y-1">
                {eventLogMilho.map((e, i) => (
                  <div key={i} className="flex items-start gap-2 text-xs py-1.5 border-b border-[#2a2c1f]/50 last:border-0">
                    <e.icon size={12} className="mt-0.5 flex-shrink-0" style={{ color: TIPO_COR[e.tipo] }} />
                    <div className="flex-1 text-[#c8c4b5]">{e.titulo}</div>
                    <div className="text-[#5a5a4e] font-mono text-[10px] uppercase">{e.fase}</div>
                  </div>
                ))}
              </div>
            )}
          </div>

          <button onClick={onContinuar} className="w-full bg-[#D4A574] hover:bg-[#E8B547] text-[#1a1a13] font-medium py-3 rounded-lg flex items-center justify-center gap-2 transition-colors">
            ver safra consolidada <ArrowRight size={16} />
          </button>
        </div>
      );
    }

    // ============================================================
    // DRE CONSOLIDADO (SOJA + MILHO)
    // ============================================================
    function DREConsolidadoScreen({ resultadoSoja, dreMilho, decisoesSoja, decisoesMilho, onReset }) {
      const fezSafrinha = !!dreMilho;
      const lucroSoja = resultadoSoja.lucro;
      const lucroMilho = fezSafrinha ? dreMilho.lucro : 0;
      const lucroConsolidado = lucroSoja + lucroMilho;
      const receitaConsolidada = resultadoSoja.receitaBruta + (fezSafrinha ? dreMilho.receitaBruta : 0);
      const custoConsolidado = resultadoSoja.custoTotal + (fezSafrinha ? dreMilho.custoTotal : 0);
      const roe = lucroConsolidado / decisoesSoja.capital;
      const caixaFinal = decisoesSoja.capital + lucroConsolidado;

      return (
        <div className="space-y-5">
          <div className="flex items-center gap-1 overflow-x-auto pb-2 -mx-1 px-1">
            <div className="bg-[#D4A574] text-[#1a1a13] flex-shrink-0 px-3 py-1 rounded text-[10px] font-mono uppercase tracking-wider">
              Safra completa · soja {fezSafrinha ? '+ milho' : '+ pousio'}
            </div>
          </div>
          <MonthLine fase="dre-consolidado" />

          {/* Resultado consolidado */}
          <div className="bg-gradient-to-br from-[#1a1c12] to-[#15170e] border border-[#D4A574]/30 rounded-lg p-5">
            <Sprout className="text-[#D4A574] mb-2" size={22} />
            <div className="text-[#7a7a68] text-[10px] uppercase tracking-widest mb-1">Resultado da safra 2026/27</div>
            <div className="flex items-baseline justify-between">
              <div>
                <div className="text-[#7a7a68] text-xs mb-0.5">Lucro consolidado</div>
                <div className={`font-display text-3xl ${lucroConsolidado >= 0 ? 'text-[#8FB36B]' : 'text-[#C44536]'}`} style={{ fontStyle: 'italic' }}>{fmtBRL(lucroConsolidado)}</div>
              </div>
              <div className={`text-xs font-mono ${lucroConsolidado >= 0 ? 'text-[#8FB36B]' : 'text-[#C44536]'}`}>
                ROE {fmtPct(roe)}
              </div>
            </div>
            <div className="grid grid-cols-2 gap-2 text-xs font-mono mt-3">
              <div className="bg-[#0f110a]/60 rounded p-2">
                <div className="text-[#7a7a68] text-[9px] uppercase tracking-wider">Receita total</div>
                <div className="text-[#E8E4D5] text-sm">{fmtBRL(receitaConsolidada)}</div>
              </div>
              <div className="bg-[#0f110a]/60 rounded p-2">
                <div className="text-[#7a7a68] text-[9px] uppercase tracking-wider">Caixa final</div>
                <div className="text-[#E8E4D5] text-sm">{fmtBRL(caixaFinal)}</div>
              </div>
            </div>
          </div>

          {/* Decomposição */}
          <div>
            <h3 className="font-display text-lg mb-2 text-[#D4A574]">Decomposição</h3>
            <div className="bg-[#15170e] border border-[#2a2c1f] rounded">
              <RowDRE label="Capital inicial" value={fmtBRL(decisoesSoja.capital)} />
              <RowDRE label="Lucro da soja" sub={`${resultadoSoja.prodReal.toFixed(1)} sc/ha`} value={fmtBRL(lucroSoja)} positivo={lucroSoja >= 0} negativo={lucroSoja < 0} />
              {fezSafrinha ? (
                <RowDRE label="Lucro da safrinha (milho)" sub={`${dreMilho.prodReal.toFixed(1)} sc/ha`} value={fmtBRL(lucroMilho)} positivo={lucroMilho >= 0} negativo={lucroMilho < 0} />
              ) : (
                <RowDRE label="Safrinha (pousio)" sub="sem receita adicional" value={fmtBRL(0)} />
              )}
              <RowDRE label="Lucro consolidado" value={fmtBRL(lucroConsolidado)} total />
              <RowDRE label="Caixa final" sub={`capital + lucro`} value={fmtBRL(caixaFinal)} />
            </div>
          </div>

          {/* Análise contrafactual: e se tivesse feito pousio? */}
          {fezSafrinha && (
            <div className="bg-[#0f110a] border border-[#2a2c1f] rounded-lg p-4">
              <div className="text-[#7a7a68] text-[10px] uppercase tracking-widest mb-2 flex items-center">
                E se tivesse feito pousio?
                <InfoTip title="Comparação contrafactual">
                  <p>Esse painel compara o resultado real da sua safrinha com o cenário em que você teria decidido por pousio (sem plantar nada após a soja).</p>
                  <p>Se a safrinha deu prejuízo, o pousio teria sido melhor. Se deu lucro, foi a decisão certa.</p>
                </InfoTip>
              </div>
              <div className="space-y-2 text-sm">
                <div className="flex justify-between items-baseline">
                  <span className="text-[#c8c4b5]">Cenário escolhido (com safrinha)</span>
                  <span className={`font-mono ${lucroConsolidado >= 0 ? 'text-[#8FB36B]' : 'text-[#C44536]'}`}>{fmtBRL(lucroConsolidado)}</span>
                </div>
                <div className="flex justify-between items-baseline">
                  <span className="text-[#c8c4b5]">Cenário alternativo (pousio)</span>
                  <span className={`font-mono ${lucroSoja >= 0 ? 'text-[#8FB36B]' : 'text-[#C44536]'}`}>{fmtBRL(lucroSoja)}</span>
                </div>
                <div className="pt-2 border-t border-[#2a2c1f] flex justify-between items-baseline">
                  <span className="text-[#D4A574]">Diferença</span>
                  <span className={`font-mono ${lucroMilho >= 0 ? 'text-[#8FB36B]' : 'text-[#C44536]'}`}>{lucroMilho >= 0 ? '+' : ''}{fmtBRL(lucroMilho)}</span>
                </div>
              </div>
              <div className="mt-3 pt-3 border-t border-[#2a2c1f] text-xs text-[#8a8a78] leading-snug">
                {lucroMilho > 0 ? '✓ A safrinha agregou valor. Decisão acertada.' :
                 lucroMilho < 0 ? '⚠ A safrinha deu prejuízo. Pousio teria sido melhor.' :
                 '→ A safrinha empatou. Trabalho extra sem retorno.'}
              </div>
            </div>
          )}

          <button onClick={onReset} className="w-full bg-[#D4A574] hover:bg-[#E8B547] text-[#1a1a13] font-medium py-3 rounded-lg flex items-center justify-center gap-2 transition-colors">
            <RotateCcw size={16} /> jogar outra safra
          </button>
        </div>
      );
    }

/* === FIM DO COMPONENTE === */

    try {
      document.getElementById('loading')?.remove();
      __createRoot(document.getElementById('root')).render(<AgroGP />);
    } catch (err) {
      const l = document.getElementById('loading') || document.getElementById('root');
      if (l) {
        l.innerHTML = '<div style="padding:20px; font-family:monospace; font-size:13px; color:#ff8a65; max-width:90vw; word-break:break-word; line-height:1.5;">' +
          '<div style="color:#D4A574; font-size:16px; margin-bottom:12px; font-family:serif; font-style:italic;">Erro ao renderizar</div>' +
          '<div>' + (err.message || err) + '</div>' +
          (err.stack ? '<div style="margin-top:8px; color:#7a7a68; white-space:pre-wrap;">' + err.stack + '</div>' : '') +
          '</div>';
      }
      throw err;
    }
  </script>
</body>
</html>
