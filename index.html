<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agro GP Pecuária — Simulador de Confinamento</title>
  <meta name="description" content="Simulador educativo de confinamento bovino. Compra boi magro, alimenta, vende gordo. Entenda o triângulo de risco da pecuária." />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0c07; font-family: sans-serif; }
    #root { min-height: 100vh; }
    #error-display {
      display: none;
      background: #1a0505;
      border: 1px solid #c44536;
      border-radius: 8px;
      padding: 16px;
      margin: 16px;
      font-family: monospace;
      font-size: 13px;
      color: #e88;
      white-space: pre-wrap;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "lucide-react": "https://esm.sh/lucide-react@0.383.0?external=react"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>
  <div id="error-display"></div>

  <script type="module">
    window.addEventListener('error', (e) => {
      const el = document.getElementById('error-display');
      el.style.display = 'block';
      el.textContent = `Erro: ${e.message}\n${e.filename}:${e.lineno}\n\n${e.error?.stack || ''}`;
    });

    import React from 'react';
    import { createRoot } from 'react-dom/client';

    // Babel transform inline
    const jsxCode = await fetch('./agro-gp-pecuaria.jsx').then(r => r.text());

    const transformed = Babel.transform(jsxCode, {
      presets: ['react'],
      plugins: [],
    }).code;

    const blob = new Blob([transformed], { type: 'application/javascript' });
    const url = URL.createObjectURL(blob);
    const mod = await import(url);
    const App = mod.default;

    createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
