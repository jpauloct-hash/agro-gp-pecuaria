<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agro GP Pecuária — Simulador de Confinamento</title>
  <meta
    name="description"
    content="Simulador educativo de confinamento bovino. Compra boi magro, alimenta, vende gordo. Entenda o triângulo de risco da pecuária."
  />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0c07; font-family: sans-serif; }
    #root { min-height: 100vh; }
    #error-display {
      display: none;
      background: #1a0505;
      border: 1px solid #c44536;
      border-radius: 8px;
      padding: 16px;
      margin: 16px;
      font-family: monospace;
      font-size: 13px;
      color: #e88;
      white-space: pre-wrap;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "react/jsx-dev-runtime": "https://esm.sh/react@18.3.1/jsx-dev-runtime",
      "lucide-react": "https://esm.sh/lucide-react@0.383.0?external=react"
    }
  }
  </script>

  <!-- Babel precisa estar disponível antes da execução do módulo principal. -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
  <div id="root"></div>
  <div id="error-display"></div>

  <script type="module">
    import React from "react";
    import { createRoot } from "react-dom/client";

    // Compatibilidade adicional para componentes JSX compilados no modo clássico.
    window.React = React;

    const errorDisplay = document.getElementById("error-display");

    function showError(error) {
      errorDisplay.style.display = "block";
      errorDisplay.textContent =
        "Erro ao iniciar o aplicativo:\n\n" +
        (error?.stack || error?.message || String(error));
    }

    window.addEventListener("error", (event) => {
      showError(event.error || new Error(event.message));
    });

    window.addEventListener("unhandledrejection", (event) => {
      showError(event.reason || new Error("Falha assíncrona desconhecida."));
    });

    async function iniciarAplicativo() {
      if (!window.Babel) {
        throw new Error("O compilador Babel não foi carregado.");
      }

      const resposta = await fetch("./agro-gp-pecuaria.jsx", { cache: "no-store" });

      if (!resposta.ok) {
        throw new Error(
          `Não foi possível carregar agro-gp-pecuaria.jsx. HTTP ${resposta.status}. ` +
          "Confirme se o arquivo está na mesma pasta do index.html."
        );
      }

      const jsxCode = await resposta.text();

      const transformed = Babel.transform(jsxCode, {
        filename: "agro-gp-pecuaria.jsx",
        presets: [["react", { runtime: "automatic" }]],
        sourceType: "module"
      }).code;

      /*
        A importação abaixo torna o bundle robusto mesmo se alguma parte do JSX
        tiver sido compilada no modo clássico e ainda chamar React.createElement.
      */
      const codigoExecutavel =
        'import React from "react";\n' +
        'window.React = React;\n' +
        transformed +
        "\n//# sourceURL=agro-gp-pecuaria.compilado.js";

      const blob = new Blob([codigoExecutavel], { type: "text/javascript" });
      const moduleUrl = URL.createObjectURL(blob);

      try {
        const modulo = await import(moduleUrl);

        if (!modulo.default) {
          throw new Error(
            "O arquivo agro-gp-pecuaria.jsx não exporta um componente padrão. " +
            "Confirme se ele termina com: export default function App() { ... }"
          );
        }

        createRoot(document.getElementById("root")).render(
          React.createElement(modulo.default)
        );
      } finally {
        URL.revokeObjectURL(moduleUrl);
      }
    }

    iniciarAplicativo().catch(showError);
  </script>
</body>
</html>
