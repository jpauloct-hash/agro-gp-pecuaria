<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Agro GP Pecuária — Simulador de Confinamento</title>

  <meta
    name="description"
    content="Simulador educativo de confinamento bovino. Compra boi magro, alimenta, vende gordo. Entenda o triângulo de risco da pecuária."
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c07;
      font-family: sans-serif;
    }

    #root {
      min-height: 100vh;
    }

    #error-display {
      display: none;
      background: #1a0505;
      border: 1px solid #c44536;
      border-radius: 8px;
      padding: 16px;
      margin: 16px;
      font-family: monospace;
      font-size: 13px;
      color: #e88;
      white-space: pre-wrap;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "lucide-react": "https://esm.sh/lucide-react@0.383.0?external=react"
    }
  }
  </script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
  <div id="root"></div>
  <div id="error-display"></div>

  <script type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';

    function showError(error) {
      const el = document.getElementById('error-display');

      el.style.display = 'block';
      el.textContent =
        `Erro ao abrir o aplicativo:\n\n${error.message}\n\n${error.stack || ''}`;
    }

    window.addEventListener('error', event => {
      showError(event.error || new Error(event.message));
    });

    window.addEventListener('unhandledrejection', event => {
      showError(
        event.reason instanceof Error
          ? event.reason
          : new Error(String(event.reason))
      );
    });

    try {
      const response = await fetch('./agro-gp-pecuaria.jsx');

      if (!response.ok) {
        throw new Error(
          `Não foi possível carregar agro-gp-pecuaria.jsx. ` +
          `Código HTTP: ${response.status}. ` +
          `Verifique se o arquivo está na mesma pasta do index.html.`
        );
      }

      const jsxCode = await response.text();

      const transformed = Babel.transform(jsxCode, {
        presets: [
          ['react', { runtime: 'classic' }]
        ]
      }).code;

      const moduleCode = `
        import React from 'react';
        ${transformed}
      `;

      const blob = new Blob([moduleCode], {
        type: 'application/javascript'
      });

      const url = URL.createObjectURL(blob);

      try {
        const mod = await import(url);

        if (!mod.default) {
          throw new Error(
            'O arquivo agro-gp-pecuaria.jsx precisa terminar com: export default App;'
          );
        }

        const App = mod.default;

        createRoot(document.getElementById('root')).render(
          React.createElement(App)
        );
      } finally {
        URL.revokeObjectURL(url);
      }
    } catch (error) {
      showError(error);
    }
  </script>
</body>
</html>
